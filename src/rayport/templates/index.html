<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>$title</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: $background;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    font-family: system-ui, sans-serif;
    color: #eee;
}
#loading {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}
#loading.hidden { display: none; }
#progress-bar {
    width: 300px;
    height: 6px;
    background: #333;
    border-radius: 3px;
    overflow: hidden;
}
#progress-fill {
    height: 100%;
    width: 0%;
    background: #e94560;
    border-radius: 3px;
    transition: width 0.2s;
}
#status { font-size: 14px; opacity: 0.7; }
canvas { display: block; }
</style>
</head>
<body>
<div id="loading">
    <div id="status">Loading...</div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
</div>
<canvas id="canvas"$canvas_size oncontextmenu="event.preventDefault()" style="display:none"></canvas>
<script>
var progressFill = document.getElementById("progress-fill");
var statusText = document.getElementById("status");
var loadingDiv = document.getElementById("loading");
var canvasEl = document.getElementById("canvas");
var presentationMode = $presentation;

function applyCanvasPresentation() {
    if (presentationMode === "stretch") {
        canvasEl.style.width = "100vw";
        canvasEl.style.height = CSS.supports("height", "100dvh") ? "100dvh" : "100vh";
        canvasEl.style.imageRendering = "auto";
        return;
    }
    if (presentationMode === "native") {
        canvasEl.style.width = "";
        canvasEl.style.height = "";
        canvasEl.style.imageRendering = "auto";
        return;
    }

    var renderWidth = canvasEl.width || 1;
    var renderHeight = canvasEl.height || 1;
    var scale = Math.min(window.innerWidth / renderWidth, window.innerHeight / renderHeight);
    if (presentationMode === "pixel-perfect" && scale >= 1) {
        scale = Math.max(1, Math.floor(scale));
        canvasEl.style.imageRendering = "pixelated";
    } else {
        canvasEl.style.imageRendering = "auto";
    }
    canvasEl.style.width = Math.max(1, Math.floor(renderWidth * scale)) + "px";
    canvasEl.style.height = Math.max(1, Math.floor(renderHeight * scale)) + "px";
}

window.addEventListener("resize", applyCanvasPresentation);
if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", applyCanvasPresentation);
}
new MutationObserver(applyCanvasPresentation).observe(canvasEl, {
    attributes: true,
    attributeFilter: ["width", "height"]
});

function installInputScaling() {
    if (typeof Browser === "undefined" || typeof GLFW === "undefined" || !GLFW.active) {
        return false;
    }

    // Emscripten's GLFW backend reports CSS pixels after it replaces
    // Browser.calculateMouseCoords(). Map those pixels back to raylib's
    // logical window so input follows every CSS presentation mode.
    Browser.calculateMouseCoords = function(pageX, pageY) {
        var rect = canvasEl.getBoundingClientRect();
        var scrollX = typeof window.scrollX !== "undefined" ? window.scrollX : window.pageXOffset;
        var scrollY = typeof window.scrollY !== "undefined" ? window.scrollY : window.pageYOffset;
        var logicalWidth = GLFW.active.width || canvasEl.width;
        var logicalHeight = GLFW.active.height || canvasEl.height;
        return {
            x: (pageX - (scrollX + rect.left)) * logicalWidth / rect.width,
            y: (pageY - (scrollY + rect.top)) * logicalHeight / rect.height
        };
    };
    return true;
}

function finalizeCanvasSetup() {
    applyCanvasPresentation();
    if (!installInputScaling()) {
        window.requestAnimationFrame(finalizeCanvasSetup);
    }
}

function updateProgress(pct, msg) {
    progressFill.style.width = pct + "%";
    if (msg) statusText.textContent = msg;
}

function ensureDir(path) {
    var segs = path.split("/").filter(Boolean);
    var cur = "";
    for (var i = 0; i < segs.length; i++) {
        try { Module["FS_createPath"](cur || "/", segs[i], true, true); } catch(e) {}
        cur += "/" + segs[i];
    }
}

var utf8Decoder = new TextDecoder();

function readTarText(bytes) {
    var end = bytes.indexOf(0);
    return utf8Decoder.decode(end >= 0 ? bytes.slice(0, end) : bytes);
}

function parsePaxRecords(bytes) {
    var records = {};
    var cursor = 0;
    while (cursor < bytes.length) {
        var space = bytes.indexOf(32, cursor);
        if (space < 0) throw new Error("Invalid PAX record length");
        var length = parseInt(utf8Decoder.decode(bytes.slice(cursor, space)), 10);
        var recordEnd = cursor + length;
        if (!Number.isInteger(length) || length <= 0 || recordEnd > bytes.length || bytes[recordEnd - 1] !== 10) {
            throw new Error("Invalid PAX record");
        }
        var record = bytes.slice(space + 1, recordEnd - 1);
        var equals = record.indexOf(61);
        if (equals < 1) throw new Error("Invalid PAX key/value record");
        var key = utf8Decoder.decode(record.slice(0, equals));
        records[key] = utf8Decoder.decode(record.slice(equals + 1));
        cursor = recordEnd;
    }
    return records;
}

function safeArchivePath(path) {
    while (path.startsWith("./")) path = path.slice(2);
    var parts = path.split("/");
    if (!path || path.startsWith("/") || path.includes("\\") || parts.includes("..")) {
        throw new Error("Unsafe archive path: " + path);
    }
    return path;
}

async function extractTarGz(buffer) {
    var ds = new DecompressionStream("gzip");
    var decompressed = new Response(new Blob([buffer]).stream().pipeThrough(ds));
    var data = new Uint8Array(await decompressed.arrayBuffer());
    var offset = 0;
    var globalPax = {};
    var nextPax = {};
    while (offset + 512 <= data.length) {
        var header = data.slice(offset, offset + 512);
        if (header.every(function(b) { return b === 0; })) break;
        var name = readTarText(header.slice(0, 100));
        var prefix = readTarText(header.slice(345, 500));
        if (prefix) name = prefix + "/" + name;
        var sizeStr = utf8Decoder.decode(header.slice(124, 136)).replace(/\0/g, "").trim();
        var size = parseInt(sizeStr, 8) || 0;
        var type = header[156];
        offset += 512;

        if (type === 120 || type === 103) {
            var pax = parsePaxRecords(data.slice(offset, offset + size));
            if (type === 103) globalPax = Object.assign(globalPax, pax);
            else nextPax = pax;
            offset += Math.ceil(size / 512) * 512;
            continue;
        }

        var metadata = Object.assign({}, globalPax, nextPax);
        nextPax = {};
        if (metadata.path) name = metadata.path;
        if (metadata.size) size = parseInt(metadata.size, 10);
        name = safeArchivePath(name);
        var fullPath = "/usr/local/game/" + name;

        if (type === 53 || name.endsWith("/")) {
            ensureDir(fullPath);
        } else if (type === 0 || type === 48) {
            var slash = fullPath.lastIndexOf("/");
            var dir = fullPath.substring(0, slash);
            var fname = fullPath.substring(slash + 1);
            ensureDir(dir);
            try { Module["FS_unlink"](fullPath); } catch(e) {}
            Module["FS_createDataFile"](dir, fname, data.slice(offset, offset + size), true, true, true);
        } else {
            throw new Error("Unsupported tar entry type " + type + " for " + name);
        }
        offset += Math.ceil(size / 512) * 512;
    }
}

var Module = {
    canvas: canvasEl,
    arguments: ["/usr/local/lib/python3.12/launcher.py"],
    preRun: [function() {
        Module.addRunDependency("game-data");
        updateProgress(30, "Downloading game...");
        fetch("game.tar.gz")
            .then(function(r) { return r.arrayBuffer(); })
            .then(function(buf) {
                updateProgress(70, "Extracting...");
                return extractTarGz(buf);
            })
            .then(function() {
                updateProgress(100, "Starting...");
                Module.removeRunDependency("game-data");
            })
            .catch(function(e) {
                statusText.textContent = "Error: " + e.message;
            });
    }],
    onRuntimeInitialized: function() {
        loadingDiv.classList.add("hidden");
        canvasEl.style.display = "block";
        window.requestAnimationFrame(finalizeCanvasSetup);
    }
};
</script>
<script src="main.js"></script>
</body>
</html>
